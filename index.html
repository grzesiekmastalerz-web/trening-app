<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trening">
<title>Trening — Diana</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #1a1a1a;
  --accent: #fdde59;
  --text: #f0f0f0;
  --muted: #888;
  --border: #333;
  --green: #4ade80;
  --red: #f87171;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 16px;
  padding-top: calc(env(safe-area-inset-top) + 12px);
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex; gap: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* Exercise card */
.exercise {
  display: none;
  padding: 0 16px 100px;
}
.exercise.active { display: block; }

.exercise-title {
  font-size: 22px;
  font-weight: 700;
  margin: 16px 0 4px;
}
.exercise-params {
  font-size: 15px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 600;
}

/* Video */
.video-wrap {
  position: relative;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  margin-bottom: 20px;
}
.video-wrap.landscape {
  padding-bottom: 56.25%;
}
.video-wrap.portrait {
  padding-bottom: 177.78%;
  max-width: 280px;
  margin-left: auto;
  margin-right: auto;
}
.video-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: 0;
}

/* Log section */
.log-section {
  margin-top: 8px;
}
.log-section h3 {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.set-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  background: var(--card);
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
}
.set-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  min-width: 28px;
}
.set-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 15px;
  text-align: center;
  -webkit-appearance: none;
}
.set-input:focus {
  border-color: var(--accent);
  outline: none;
}
.set-input::placeholder { color: #555; }
.set-unit {
  font-size: 12px;
  color: var(--muted);
  min-width: 28px;
}

.done-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.done-btn.checked {
  background: var(--green);
  border-color: var(--green);
}
.done-btn.checked::after {
  content: '✓';
  color: #000;
  font-weight: 700;
  font-size: 16px;
}

/* Notes */
.notes-area {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  resize: vertical;
  min-height: 60px;
  margin-top: 12px;
  font-family: inherit;
}
.notes-area:focus {
  border-color: var(--accent);
  outline: none;
}

/* Date nav */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 10px 16px;
}
.date-nav button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.date-nav .date-label {
  font-size: 15px;
  font-weight: 600;
  min-width: 140px;
  text-align: center;
}

/* History view */
.history-view {
  display: none;
  padding: 16px;
  padding-bottom: 100px;
}
.history-view.active { display: block; }
.history-entry {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.history-entry .h-date {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
.history-entry .h-sets {
  font-size: 14px;
  margin-top: 4px;
}

/* Bottom bar */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
  display: flex;
  justify-content: space-around;
}
.bar-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  cursor: pointer;
  padding: 4px 12px;
}
.bar-btn.active { color: var(--accent); }
.bar-btn .icon { font-size: 22px; }

/* Timer overlay */
.timer-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.timer-overlay.show { display: flex; }
.timer-display {
  font-size: 72px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}
.timer-label {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 20px;
}
.timer-buttons { display: flex; gap: 12px; margin-top: 24px; }
.timer-btn {
  padding: 12px 32px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn.start { background: var(--accent); color: #000; }
.timer-btn.stop { background: var(--red); color: #fff; }
.timer-btn.close { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* Export section */
.settings-view {
  display: none;
  padding: 16px;
  padding-bottom: 100px;
}
.settings-view.active { display: block; }
.settings-view h2 { margin-bottom: 16px; }
.s-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
}
.s-btn:active { background: var(--border); }
.s-btn .s-desc { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; }
.danger { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>Trening — Diana</h1>
  <div class="sub" id="sessionDate">7 cwiczen &middot; ~1h 10min</div>
</div>

<div id="dateNavContainer" class="date-nav">
  <button onclick="changeDate(-1)">&larr;</button>
  <div class="date-label" id="dateLabel"></div>
  <button onclick="changeDate(1)">&rarr;</button>
</div>

<div id="tabsContainer" class="tabs"></div>

<div id="exercisesContainer"></div>

<div id="historyView" class="history-view"></div>

<div id="settingsView" class="settings-view">
  <h2>Cloud Backup</h2>
  <div style="margin-bottom:16px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px">GitHub Token (wklej raz, dane syncują się automatycznie)</div>
    <div style="display:flex;gap:8px">
      <input class="set-input" type="password" id="tokenInput" placeholder="github_pat_..." style="text-align:left;flex:1">
      <button class="s-btn" style="width:auto;margin:0;padding:10px 16px" onclick="saveToken()">Zapisz</button>
    </div>
    <div id="syncStatus" style="font-size:12px;margin-top:6px;min-height:18px"></div>
  </div>
  <button class="s-btn" onclick="syncToGist()">
    Wymus sync teraz
    <div class="s-desc">Zapisz dane do GitHub Gist</div>
  </button>
  <button class="s-btn" onclick="restoreFromGist()">
    Przywroc z backupu
    <div class="s-desc">Odzyskaj dane po wyczyszczeniu przegladarki</div>
  </button>
  <h2 style="margin-top:24px">Lokalnie</h2>
  <button class="s-btn" onclick="exportData()">
    Eksport danych (JSON)
    <div class="s-desc">Pobierz plik z cala historia treningow</div>
  </button>
  <button class="s-btn" onclick="document.getElementById('importInput').click()">
    Import danych
    <div class="s-desc">Wczytaj wczesniej wyeksportowane dane</div>
  </button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  <button class="s-btn danger" onclick="clearData()">
    Wyczysc wszystkie dane
    <div class="s-desc">Usuwa cala historie treningow</div>
  </button>
</div>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-label">Odpoczynek</div>
  <div class="timer-display" id="timerDisplay">0:00</div>
  <div class="timer-buttons">
    <button class="timer-btn close" onclick="closeTimer()">Zamknij</button>
    <button class="timer-btn start" id="timerStartBtn" onclick="toggleTimer()">Start</button>
  </div>
</div>

<div class="bottom-bar">
  <button class="bar-btn active" id="btnTrening" onclick="showView('trening')">
    <span class="icon">💪</span>
    Trening
  </button>
  <button class="bar-btn" id="btnTimer" onclick="showTimer()">
    <span class="icon">⏱</span>
    Timer
  </button>
  <button class="bar-btn" id="btnHistoria" onclick="showView('historia')">
    <span class="icon">📊</span>
    Historia
  </button>
  <button class="bar-btn" id="btnUstawienia" onclick="showView('ustawienia')">
    <span class="icon">⚙️</span>
    Dane
  </button>
</div>

<script>
// === EXERCISE DATA ===
const exercises = [
  {
    id: 'glute-bridge',
    name: 'ISO Hold Glute Bridge',
    params: '2 serie × 30-45s / strona',
    video: 'https://www.youtube.com/shorts/PZinEf_K2UY',
    portrait: true,
    sets: 2,
    type: 'time', // czas w sekundach
    unit: 'sek',
    bilateral: true
  },
  {
    id: 'bird-dog',
    name: 'ISO Hold Bird Dog',
    detail: 'Bark cofnięty',
    params: '2 serie × 45s / strona',
    video: 'https://youtu.be/GwBprD9TLP4',
    portrait: false,
    sets: 2,
    type: 'time',
    unit: 'sek',
    bilateral: true
  },
  {
    id: 'squat-deadlift',
    name: 'Back Squat / Trap Bar Deadlift',
    detail: '2 powtórzenia w zapasie',
    params: '3 serie × 5 powtórzeń',
    video: null,
    sets: 3,
    type: 'weight',
    unit: 'kg',
    reps: 5
  },
  {
    id: 'landmine-press',
    name: 'Landmine Press',
    detail: 'Standing lub kneeling',
    params: '3 serie × 8 powt. / strona',
    video: 'https://youtu.be/hhQdExaLUuU',
    portrait: false,
    sets: 3,
    type: 'weight',
    unit: 'kg',
    reps: 8,
    bilateral: true
  },
  {
    id: 'lat-pulldown',
    name: 'Lat Pull Down',
    params: '3 serie × 6-8 powtórzeń',
    video: 'https://www.youtube.com/shorts/bNmvKpJSWKM',
    portrait: true,
    sets: 3,
    type: 'weight',
    unit: 'kg',
    reps: '6-8'
  },
  {
    id: 'cable-rotation',
    name: 'Lying Cable Rotation',
    params: '2-3 serie × 10-12 powt.',
    video: 'https://youtu.be/QuIOwsv5QLM',
    portrait: false,
    sets: 3,
    type: 'weight',
    unit: 'kg',
    reps: '10-12'
  },
  {
    id: 'leg-curl',
    name: 'Lying Leg Curl Machine',
    params: '3 serie × 10-12 powtórzeń',
    video: 'https://www.youtube.com/shorts/I3MdbhUBZ1Q',
    portrait: true,
    sets: 3,
    type: 'weight',
    unit: 'kg',
    reps: '10-12'
  }
];

// === STATE ===
let currentDate = todayStr();
let activeExercise = 0;
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(str) {
  const [y,m,d] = str.split('-');
  const days = ['Niedz','Pon','Wt','Śr','Czw','Pt','Sob'];
  const date = new Date(+y, +m-1, +d);
  return `${days[date.getDay()]} ${d}.${m}.${y}`;
}

// === STORAGE ===
function getKey(exId, date) { return `t_${exId}_${date}`; }

function loadSets(exId, date) {
  const raw = localStorage.getItem(getKey(exId, date));
  return raw ? JSON.parse(raw) : null;
}

function saveSets(exId, date, data) {
  localStorage.setItem(getKey(exId, date), JSON.stringify(data));
}

function loadNotes(exId, date) {
  return localStorage.getItem(`n_${exId}_${date}`) || '';
}

function saveNotes(exId, date, text) {
  if (text) localStorage.setItem(`n_${exId}_${date}`, text);
  else localStorage.removeItem(`n_${exId}_${date}`);
  scheduleSyncToGist();
}

// === GIST CLOUD BACKUP ===
const GIST_FILENAME = 'trening-backup.json';
let syncTimeout = null;

function getToken() { return localStorage.getItem('gh_token'); }
function setToken(t) { localStorage.setItem('gh_token', t); }
function getGistId() { return localStorage.getItem('gist_id'); }
function setGistId(id) { localStorage.setItem('gist_id', id); }

function getAllTrainingData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('t_') || key.startsWith('n_')) {
      data[key] = localStorage.getItem(key);
    }
  }
  return data;
}

function scheduleSyncToGist() {
  if (!getToken()) return;
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => syncToGist(), 3000);
}

async function syncToGist() {
  const token = getToken();
  if (!token) return;
  const data = getAllTrainingData();
  const body = { files: {} };
  body.files[GIST_FILENAME] = { content: JSON.stringify(data, null, 2) };
  body.description = 'Trening backup — ' + new Date().toLocaleString('pl-PL');

  try {
    const gistId = getGistId();
    let res;
    if (gistId) {
      res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } else {
      body.public = false;
      res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    setGistId(json.id);
    updateSyncStatus('ok');
  } catch (err) {
    console.error('Gist sync error:', err);
    updateSyncStatus('error');
  }
}

async function restoreFromGist() {
  const token = getToken();
  const gistId = getGistId();
  if (!token || !gistId) { alert('Brak tokena lub ID backupu'); return; }
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const content = json.files[GIST_FILENAME]?.content;
    if (!content) { alert('Brak danych w backupie'); return; }
    const data = JSON.parse(content);
    Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
    render();
    alert('Dane przywrocone z backupu!');
  } catch (err) {
    alert('Blad przywracania: ' + err.message);
  }
}

function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'ok') {
    el.textContent = 'Zsynchronizowano ' + new Date().toLocaleTimeString('pl-PL');
    el.style.color = 'var(--green)';
  } else {
    el.textContent = 'Blad synchronizacji';
    el.style.color = 'var(--red)';
  }
}

// === YOUTUBE EMBED ===
function getEmbedUrl(url) {
  if (!url) return null;
  let videoId = '';
  if (url.includes('shorts/')) videoId = url.split('shorts/')[1].split('?')[0];
  else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
  else if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
  return videoId ? `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&playsinline=1` : null;
}

// === RENDER ===
function render() {
  document.getElementById('dateLabel').textContent = formatDate(currentDate);

  // Tabs
  const tabsHtml = exercises.map((ex, i) =>
    `<div class="tab ${i === activeExercise ? 'active' : ''}" onclick="switchExercise(${i})">${i+1}</div>`
  ).join('');
  document.getElementById('tabsContainer').innerHTML = tabsHtml;

  // Exercises
  let exHtml = '';
  exercises.forEach((ex, i) => {
    const saved = loadSets(ex.id, currentDate) || {};
    const notes = loadNotes(ex.id, currentDate);

    let videoHtml = '';
    const embedUrl = getEmbedUrl(ex.video);
    if (embedUrl) {
      videoHtml = `
        <div class="video-wrap ${ex.portrait ? 'portrait' : 'landscape'}">
          <iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe>
        </div>`;
    }

    let setsHtml = '';
    for (let s = 1; s <= ex.sets; s++) {
      const setData = saved[`s${s}`] || {};

      if (ex.type === 'time') {
        if (ex.bilateral) {
          setsHtml += `
            <div class="set-row">
              <span class="set-label">S${s}</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="L"
                value="${setData.left || ''}" onchange="onSetChange(${i}, ${s}, 'left', this.value)">
              <span class="set-unit">sek L</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="R"
                value="${setData.right || ''}" onchange="onSetChange(${i}, ${s}, 'right', this.value)">
              <span class="set-unit">sek R</span>
              <button class="done-btn ${setData.done ? 'checked' : ''}" onclick="toggleDone(${i}, ${s})"></button>
            </div>`;
        } else {
          setsHtml += `
            <div class="set-row">
              <span class="set-label">S${s}</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="czas"
                value="${setData.time || ''}" onchange="onSetChange(${i}, ${s}, 'time', this.value)">
              <span class="set-unit">sek</span>
              <button class="done-btn ${setData.done ? 'checked' : ''}" onclick="toggleDone(${i}, ${s})"></button>
            </div>`;
        }
      } else {
        // weight type
        if (ex.bilateral) {
          setsHtml += `
            <div class="set-row">
              <span class="set-label">S${s}</span>
              <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
                value="${setData.weight || ''}" onchange="onSetChange(${i}, ${s}, 'weight', this.value)">
              <span class="set-unit">kg</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="L"
                value="${setData.repsL || ''}" onchange="onSetChange(${i}, ${s}, 'repsL', this.value)">
              <span class="set-unit">× L</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="R"
                value="${setData.repsR || ''}" onchange="onSetChange(${i}, ${s}, 'repsR', this.value)">
              <span class="set-unit">× R</span>
              <button class="done-btn ${setData.done ? 'checked' : ''}" onclick="toggleDone(${i}, ${s})"></button>
            </div>`;
        } else {
          setsHtml += `
            <div class="set-row">
              <span class="set-label">S${s}</span>
              <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
                value="${setData.weight || ''}" onchange="onSetChange(${i}, ${s}, 'weight', this.value)">
              <span class="set-unit">kg</span>
              <input class="set-input" type="number" inputmode="numeric" placeholder="powt"
                value="${setData.reps || ''}" onchange="onSetChange(${i}, ${s}, 'reps', this.value)">
              <span class="set-unit">×</span>
              <button class="done-btn ${setData.done ? 'checked' : ''}" onclick="toggleDone(${i}, ${s})"></button>
            </div>`;
        }
      }
    }

    exHtml += `
      <div class="exercise ${i === activeExercise ? 'active' : ''}" id="ex-${i}">
        <div class="exercise-title">${ex.name}</div>
        ${ex.detail ? `<div style="color:var(--muted);font-size:14px;margin-bottom:4px">${ex.detail}</div>` : ''}
        <div class="exercise-params">${ex.params}</div>
        ${videoHtml}
        <div class="log-section">
          <h3>Dzisiejszy trening</h3>
          ${setsHtml}
          <textarea class="notes-area" placeholder="Notatki (samopoczucie, RPE, uwagi...)"
            onchange="onNotesChange(${i}, this.value)">${notes}</textarea>
        </div>
      </div>`;
  });
  document.getElementById('exercisesContainer').innerHTML = exHtml;
}

// === INTERACTIONS ===
function switchExercise(idx) {
  activeExercise = idx;
  render();
  window.scrollTo(0, 0);
}

function changeDate(delta) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  render();
}

function onSetChange(exIdx, setNum, field, value) {
  const ex = exercises[exIdx];
  const saved = loadSets(ex.id, currentDate) || {};
  if (!saved[`s${setNum}`]) saved[`s${setNum}`] = {};
  saved[`s${setNum}`][field] = value;
  saveSets(ex.id, currentDate, saved);
  scheduleSyncToGist();
}

function toggleDone(exIdx, setNum) {
  const ex = exercises[exIdx];
  const saved = loadSets(ex.id, currentDate) || {};
  if (!saved[`s${setNum}`]) saved[`s${setNum}`] = {};
  saved[`s${setNum}`].done = !saved[`s${setNum}`].done;
  saveSets(ex.id, currentDate, saved);
  scheduleSyncToGist();
  render();
}

function onNotesChange(exIdx, text) {
  saveNotes(exercises[exIdx].id, currentDate, text);
}

// === TIMER ===
function showTimer() {
  document.getElementById('timerOverlay').classList.add('show');
}

function closeTimer() {
  stopTimer();
  document.getElementById('timerOverlay').classList.remove('show');
}

function toggleTimer() {
  if (timerRunning) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  timerRunning = true;
  timerSeconds = 0;
  document.getElementById('timerStartBtn').textContent = 'Reset';
  document.getElementById('timerStartBtn').className = 'timer-btn stop';
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerSeconds = 0;
  document.getElementById('timerDisplay').textContent = '0:00';
  document.getElementById('timerStartBtn').textContent = 'Start';
  document.getElementById('timerStartBtn').className = 'timer-btn start';
}

// === VIEWS ===
function showView(view) {
  document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dateNavContainer').style.display = view === 'trening' ? 'flex' : 'none';
  document.getElementById('tabsContainer').style.display = view === 'trening' ? 'flex' : 'none';
  document.getElementById('exercisesContainer').style.display = view === 'trening' ? 'block' : 'none';
  document.getElementById('historyView').className = view === 'historia' ? 'history-view active' : 'history-view';
  document.getElementById('settingsView').className = view === 'ustawienia' ? 'settings-view active' : 'settings-view';

  if (view === 'trening') document.getElementById('btnTrening').classList.add('active');
  if (view === 'historia') { document.getElementById('btnHistoria').classList.add('active'); renderHistory(); }
  if (view === 'ustawienia') document.getElementById('btnUstawienia').classList.add('active');
}

function renderHistory() {
  // Collect all dates that have data
  const dates = new Set();
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('t_') || key.startsWith('n_')) {
      const parts = key.split('_');
      dates.add(parts[parts.length - 1]);
    }
  }

  const sorted = [...dates].sort().reverse();

  if (sorted.length === 0) {
    document.getElementById('historyView').innerHTML = '<p style="color:var(--muted);text-align:center;margin-top:40px">Brak historii treningów</p>';
    return;
  }

  let html = '<h2 style="margin-bottom:16px">Historia treningów</h2>';

  sorted.forEach(date => {
    html += `<div style="margin-bottom:20px">
      <div style="font-size:15px;font-weight:700;color:var(--accent);margin-bottom:8px">${formatDate(date)}</div>`;

    exercises.forEach(ex => {
      const saved = loadSets(ex.id, date);
      const notes = loadNotes(ex.id, date);
      if (!saved && !notes) return;

      let setsText = [];
      for (let s = 1; s <= ex.sets; s++) {
        const d = saved?.[`s${s}`];
        if (!d) continue;
        if (ex.type === 'time') {
          if (ex.bilateral) {
            if (d.left || d.right) setsText.push(`S${s}: ${d.left||'—'}s L / ${d.right||'—'}s R`);
          } else {
            if (d.time) setsText.push(`S${s}: ${d.time}s`);
          }
        } else {
          if (ex.bilateral) {
            if (d.weight || d.repsL || d.repsR) setsText.push(`S${s}: ${d.weight||'—'}kg × ${d.repsL||'—'}L/${d.repsR||'—'}R`);
          } else {
            if (d.weight || d.reps) setsText.push(`S${s}: ${d.weight||'—'}kg × ${d.reps||'—'}`);
          }
        }
      }

      if (setsText.length || notes) {
        html += `<div class="history-entry">
          <div style="font-weight:600;margin-bottom:4px">${ex.name}</div>
          ${setsText.length ? `<div class="h-sets">${setsText.join(' &nbsp;|&nbsp; ')}</div>` : ''}
          ${notes ? `<div style="color:var(--muted);font-size:13px;margin-top:4px">${notes}</div>` : ''}
        </div>`;
      }
    });

    html += '</div>';
  });

  document.getElementById('historyView').innerHTML = html;
}

// === EXPORT / IMPORT ===
function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('t_') || key.startsWith('n_')) {
      data[key] = localStorage.getItem(key);
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trening-export-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
      render();
      alert('Dane zaimportowane!');
    } catch (err) {
      alert('Błąd importu: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearData() {
  if (!confirm('Na pewno usunąć WSZYSTKIE dane treningowe?')) return;
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('t_') || key.startsWith('n_')) keys.push(key);
  }
  keys.forEach(k => localStorage.removeItem(k));
  render();
  alert('Dane usunięte.');
}

// === SWIPE GESTURES ===
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0 && activeExercise < exercises.length - 1) {
      switchExercise(activeExercise + 1);
    } else if (dx > 0 && activeExercise > 0) {
      switchExercise(activeExercise - 1);
    }
  }
}, { passive: true });

// === TOKEN ===
function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) { alert('Wklej token'); return; }
  setToken(val);
  document.getElementById('tokenInput').value = '';
  syncToGist();
}

// === INIT ===
render();
if (getToken()) {
  document.getElementById('syncStatus').textContent = 'Cloud backup aktywny';
  document.getElementById('syncStatus').style.color = 'var(--green)';
}
</script>
