<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trening">
<title>Trening — Diana</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #1a1a1a;
  --accent: #fdde59;
  --text: #f0f0f0;
  --muted: #888;
  --border: #333;
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 10px 16px;
  padding-top: calc(env(safe-area-inset-top) + 10px);
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; font-weight: 700; }
.header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Session bar */
.session-bar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.session-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.session-btn.start-session { background: var(--green); color: #000; }
.session-btn.end-session { background: var(--red); color: #fff; }
.session-timer {
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}
.session-timer.transition {
  color: var(--blue);
  animation: pulse 1s infinite;
}

.tabs {
  display: flex; gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
.tab.done { border-color: var(--green); color: var(--green); }
.tab.done.active { background: var(--green); color: #000; border-color: var(--green); }

.exercise { display: none; padding: 0 12px 120px; }
.exercise.active { display: block; }
.exercise-title { font-size: 18px; font-weight: 700; margin: 12px 0 2px; }
.exercise-detail { color: var(--muted); font-size: 13px; margin-bottom: 2px; }
.exercise-params { font-size: 14px; color: var(--accent); margin-bottom: 12px; font-weight: 600; }

.video-wrap {
  position: relative; width: 100%;
  border-radius: 10px; overflow: hidden;
  background: #000; margin-bottom: 16px;
}
.video-wrap.landscape { padding-bottom: 56.25%; }
.video-wrap.portrait { padding-bottom: 140%; max-width: 240px; margin-left: auto; margin-right: auto; }
.video-wrap iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: 0;
}

.log-section { margin-top: 4px; }

.set-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px; background: var(--card);
  border-radius: 10px; padding: 8px 10px;
  border: 1px solid var(--border);
}
.set-label { font-size: 13px; font-weight: 700; color: var(--accent); width: 24px; flex-shrink: 0; }
.set-input {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 4px; color: var(--text);
  font-size: 15px; text-align: center; -webkit-appearance: none;
  width: 52px; flex-shrink: 0;
}
.set-input:focus { border-color: var(--accent); outline: none; }
.set-input::placeholder { color: #444; font-size: 12px; }
.set-input.empty-warn { border-color: var(--accent); background: rgba(253,222,89,0.08); }
.set-unit { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.set-spacer { flex: 1; }
.side-label { font-size: 11px; color: var(--muted); font-weight: 600; width: 10px; flex-shrink: 0; }

.done-btn {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 8px;
  border: 2px solid var(--border); background: transparent;
  cursor: pointer; flex-shrink: 0;
}
.done-btn.checked { background: var(--green); border-color: var(--green); }
.done-btn.checked::after { content: '✓'; color: #000; font-weight: 700; font-size: 15px; }

.rest-btn {
  font-size: 11px; color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 8px; cursor: pointer; flex-shrink: 0;
  min-width: 44px; text-align: center;
}
.rest-btn.resting { background: var(--accent); color: #000; font-weight: 700; border-color: var(--accent); animation: pulse 1s infinite; }
.rest-btn.has-rest { color: var(--green); border-color: var(--green); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

.notes-area {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px; color: var(--text);
  font-size: 14px; resize: none; min-height: 44px; max-height: 100px;
  margin-top: 10px; font-family: inherit;
}
.notes-area:focus { border-color: var(--accent); outline: none; }

.prev-data {
  font-size: 11px; color: var(--muted); margin-bottom: 8px;
  padding: 6px 10px; background: var(--card); border-radius: 8px;
  border-left: 3px solid var(--accent);
}

/* Exercise history accordion */
.ex-history-toggle {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; padding: 8px 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; font-size: 13px;
  color: var(--muted); font-weight: 600;
  width: 100%; text-align: left;
}
.ex-history-toggle .arrow { transition: transform 0.2s; }
.ex-history-toggle.open .arrow { transform: rotate(90deg); }
.ex-history-list {
  display: none; margin-top: 4px;
}
.ex-history-list.open { display: block; }
.ex-history-item {
  padding: 6px 10px; font-size: 12px; color: var(--muted);
  border-left: 2px solid var(--border); margin-left: 10px;
  margin-bottom: 4px;
}
.ex-history-item .eh-date { color: var(--accent); font-weight: 600; }

/* Action buttons */
.action-btn {
  display: block; width: 100%; padding: 14px;
  border-radius: 12px; border: none;
  font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 16px; text-align: center;
}
.action-btn.save-ex { background: var(--green); color: #000; }
.action-btn.save-ex:active { background: #38c970; }
.action-btn.finish { background: var(--accent); color: #000; }

/* Transition banner */
.transition-banner {
  background: var(--blue); color: #000; text-align: center;
  padding: 10px 16px; font-weight: 700; font-size: 14px;
  display: none;
}
.transition-banner.show { display: block; }
.transition-banner .t-time { font-size: 20px; font-variant-numeric: tabular-nums; }

.date-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 8px 16px;
}
.date-nav button {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  width: 34px; height: 34px; border-radius: 8px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.date-nav .date-label { font-size: 14px; font-weight: 600; min-width: 130px; text-align: center; }

.history-view { display: none; padding: 12px; padding-bottom: 100px; }
.history-view.active { display: block; }
.history-view h2 { font-size: 18px; margin-bottom: 12px; }
.history-date { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 6px; margin-top: 16px; }
.history-entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 6px; }
.history-entry .h-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.history-entry .h-sets { font-size: 13px; color: var(--muted); line-height: 1.4; }
.history-entry .h-notes { font-size: 12px; color: #666; margin-top: 3px; font-style: italic; }
.history-session { font-size: 12px; color: var(--blue); margin-bottom: 8px; }

.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border);
  padding: 6px 16px; padding-bottom: calc(env(safe-area-inset-bottom) + 6px);
  display: flex; justify-content: space-around;
}
.bar-btn {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  background: none; border: none; color: var(--muted); font-size: 10px;
  cursor: pointer; padding: 4px 12px;
}
.bar-btn.active { color: var(--accent); }
.bar-btn .icon { font-size: 20px; }

/* Summary overlay */
.summary-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95); z-index: 200;
  overflow-y: auto; padding: 20px 16px;
  padding-top: calc(env(safe-area-inset-top) + 20px);
}
.summary-overlay.show { display: block; }
.summary-overlay h2 { font-size: 22px; margin-bottom: 16px; text-align: center; }
.summary-stat {
  display: flex; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px solid var(--border); font-size: 14px;
}
.summary-stat .label { color: var(--muted); }
.summary-stat .value { font-weight: 700; }
.summary-stat .value.up { color: var(--green); }
.summary-stat .value.down { color: var(--red); }
.summary-ex { margin-top: 16px; }
.summary-ex h3 { font-size: 15px; margin-bottom: 6px; color: var(--accent); }
.summary-ex .comp { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.summary-close {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  border: none; background: var(--accent); color: #000;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px;
}

.settings-view { display: none; padding: 12px; padding-bottom: 100px; }
.settings-view.active { display: block; }
.settings-view h2 { margin-bottom: 12px; font-size: 18px; }
.s-btn {
  display: block; width: 100%; padding: 12px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 6px; text-align: left;
}
.s-btn:active { background: var(--border); }
.s-btn .s-desc { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
.danger { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>Trening — Diana</h1>
  <div class="sub">7 cwiczen &middot; ~1h 10min</div>
  <div class="session-bar" id="sessionBar"></div>
</div>

<div class="transition-banner" id="transitionBanner">
  Przerwa miedzy cwiczeniami: <span class="t-time" id="transitionTime">0:00</span>
</div>

<div id="dateNavContainer" class="date-nav">
  <button onclick="changeDate(-1)">&larr;</button>
  <div class="date-label" id="dateLabel"></div>
  <button onclick="changeDate(1)">&rarr;</button>
</div>

<div id="tabsContainer" class="tabs"></div>
<div id="exercisesContainer"></div>
<div id="historyView" class="history-view"></div>

<div id="settingsView" class="settings-view">
  <h2>Cloud Backup</h2>
  <div style="margin-bottom:14px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">GitHub Token (wklej raz, syncuje automatycznie)</div>
    <div style="display:flex;gap:6px">
      <input class="set-input" type="password" id="tokenInput" placeholder="github_pat_..." style="text-align:left;flex:1;width:auto">
      <button class="s-btn" style="width:auto;margin:0;padding:8px 14px" onclick="saveToken()">OK</button>
    </div>
    <div id="syncStatus" style="font-size:11px;margin-top:4px;min-height:16px"></div>
  </div>
  <button class="s-btn" onclick="syncToGist()">Wymus sync<div class="s-desc">Zapisz dane do GitHub Gist</div></button>
  <button class="s-btn" onclick="restoreFromGist()">Przywroc z backupu<div class="s-desc">Odzyskaj dane po wyczyszczeniu</div></button>
  <div style="margin-top:8px;padding:8px 10px;background:var(--card);border-radius:8px;font-size:11px;color:var(--muted)" id="gistInfo"></div>
  <h2 style="margin-top:20px">Lokalnie</h2>
  <button class="s-btn" onclick="exportData()">Eksport JSON<div class="s-desc">Pobierz historia treningow</div></button>
  <button class="s-btn" onclick="document.getElementById('importInput').click()">Import<div class="s-desc">Wczytaj dane</div></button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  <button class="s-btn danger" onclick="clearData()">Wyczysc dane<div class="s-desc">Usuwa cala historie</div></button>
</div>

<div class="summary-overlay" id="summaryOverlay"></div>

<div class="bottom-bar">
  <button class="bar-btn active" id="btnTrening" onclick="showView('trening')"><span class="icon">💪</span>Trening</button>
  <button class="bar-btn" id="btnHistoria" onclick="showView('historia')"><span class="icon">📊</span>Historia</button>
  <button class="bar-btn" id="btnUstawienia" onclick="showView('ustawienia')"><span class="icon">⚙️</span>Dane</button>
</div>

<script>
const exercises = [
  { id:'glute-bridge', name:'ISO Hold Glute Bridge', params:'2 serie × 30-45s / strona', video:'https://www.youtube.com/shorts/PZinEf_K2UY', portrait:true, sets:2, type:'time', bilateral:true },
  { id:'bird-dog', name:'ISO Hold Bird Dog', detail:'Bark cofniety', params:'2 serie × 45s / strona', video:'https://youtu.be/GwBprD9TLP4', portrait:false, sets:2, type:'time', bilateral:true },
  { id:'squat-deadlift', name:'Back Squat / Trap Bar Deadlift', detail:'2 powtorzenia w zapasie', params:'3 serie × 5 powtorzen', video:'https://youtube.com/shorts/JfhNkNz59lI', portrait:true, sets:3, type:'weight', bilateral:false },
  { id:'landmine-press', name:'Landmine Press', detail:'Standing lub kneeling', params:'3 serie × 8 powt. / strona', video:'https://youtu.be/hhQdExaLUuU', portrait:false, sets:3, type:'weight', bilateral:true },
  { id:'lat-pulldown', name:'Lat Pull Down', params:'3 serie × 6-8 powtorzen', video:'https://www.youtube.com/shorts/bNmvKpJSWKM', portrait:true, sets:3, type:'weight', bilateral:false },
  { id:'cable-rotation', name:'Lying Cable Rotation', params:'2-3 serie × 10-12 powt.', video:'https://www.youtube.com/watch?v=QulOwsv5QLM', portrait:false, sets:3, type:'weight', bilateral:false },
  { id:'leg-curl', name:'Lying Leg Curl Machine', params:'3 serie × 10-12 powtorzen', video:'https://www.youtube.com/shorts/I3MdbhUBZ1Q', portrait:true, sets:3, type:'weight', bilateral:false }
];

let currentDate = todayStr();
let activeExercise = 0;

// Session state
let sessionStartTime = null;
let sessionInterval = null;
let transitionInterval = null;
let transitionStartTime = null;
let isInTransition = false;

function todayStr() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function formatDate(str) { const [y,m,d]=str.split('-'); const days=['Niedz','Pon','Wt','Sr','Czw','Pt','Sob']; return `${days[new Date(+y,+m-1,+d).getDay()]} ${d}.${m}.${y}`; }
function dateOffset(base,days) { const d=new Date(base); d.setDate(d.getDate()+days); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtTime(sec) { const m=Math.floor(sec/60),s=sec%60; return `${m}:${String(s).padStart(2,'0')}`; }

// Storage
function getKey(exId,date){return `t_${exId}_${date}`}
function loadSets(exId,date){const r=localStorage.getItem(getKey(exId,date));return r?JSON.parse(r):null}
function saveSets(exId,date,data){localStorage.setItem(getKey(exId,date),JSON.stringify(data))}
function loadNotes(exId,date){return localStorage.getItem(`n_${exId}_${date}`)||''}
function saveNotes(exId,date,text){if(text)localStorage.setItem(`n_${exId}_${date}`,text);else localStorage.removeItem(`n_${exId}_${date}`);scheduleSyncToGist()}
function loadSession(date){const r=localStorage.getItem(`sess_${date}`);return r?JSON.parse(r):null}
function saveSession(date,data){localStorage.setItem(`sess_${date}`,JSON.stringify(data));scheduleSyncToGist()}

// Gist
const GIST_FILENAME='trening-backup.json';
let syncTimeout=null;
function getToken(){return localStorage.getItem('gh_token')}
function setToken(t){localStorage.setItem('gh_token',t)}
function getGistId(){return localStorage.getItem('gist_id')}
function setGistId(id){localStorage.setItem('gist_id',id)}
function getAllTrainingData(){const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('t_')||k.startsWith('n_')||k.startsWith('sess_'))d[k]=localStorage.getItem(k)}return d}
function scheduleSyncToGist(){if(!getToken())return;clearTimeout(syncTimeout);syncTimeout=setTimeout(()=>syncToGist(),3000)}
async function syncToGist(){const token=getToken();if(!token)return;const data=getAllTrainingData();const body={files:{}};body.files[GIST_FILENAME]={content:JSON.stringify(data,null,2)};body.description='Trening backup — '+new Date().toLocaleString('pl-PL');try{const gistId=getGistId();let res;if(gistId){res=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)})}else{body.public=false;res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)})}if(!res.ok)throw new Error(`HTTP ${res.status}`);const json=await res.json();setGistId(json.id);updateSyncStatus('ok')}catch(err){console.error('Gist sync error:',err);updateSyncStatus('error')}}
async function restoreFromGist(){const token=getToken();const gistId=getGistId();if(!token||!gistId){alert('Brak tokena lub ID backupu');return}try{const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`Bearer ${token}`}});if(!res.ok)throw new Error(`HTTP ${res.status}`);const json=await res.json();const content=json.files[GIST_FILENAME]?.content;if(!content){alert('Brak danych w backupie');return}const data=JSON.parse(content);Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));render();alert('Przywrocono!')}catch(err){alert('Blad: '+err.message)}}
function updateSyncStatus(s){const el=document.getElementById('syncStatus');if(!el)return;if(s==='ok'){el.textContent='Zsync '+new Date().toLocaleTimeString('pl-PL');el.style.color='var(--green)'}else{el.textContent='Blad sync';el.style.color='var(--red)'}}

// YouTube
function getVideoId(url){if(!url)return null;if(url.includes('shorts/'))return url.split('shorts/')[1].split('?')[0];if(url.includes('youtu.be/'))return url.split('youtu.be/')[1].split('?')[0];if(url.includes('v='))return url.split('v=')[1].split('&')[0];return null}

// Find previous data for exercise
function findPrevData(exId, beforeDate, count) {
  const results = [];
  const d = new Date(beforeDate);
  for (let i = 1; i <= 60 && results.length < count; i++) {
    d.setDate(d.getDate() - 1);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const data = loadSets(exId, ds);
    if (data) results.push({ date: ds, data });
  }
  return results;
}

// === SESSION MANAGEMENT ===
function startSession() {
  sessionStartTime = Date.now();
  const sess = loadSession(currentDate) || {};
  sess.startTime = sessionStartTime;
  sess.transitions = sess.transitions || {};
  saveSession(currentDate, sess);
  sessionInterval = setInterval(updateSessionTimer, 1000);
  render();
}

function updateSessionTimer() {
  if (!sessionStartTime) return;
  const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  const el = document.getElementById('sessionTime');
  if (el) el.textContent = fmtTime(elapsed);
}

function startTransition(fromIdx) {
  isInTransition = true;
  transitionStartTime = Date.now();
  document.getElementById('transitionBanner').classList.add('show');
  transitionInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - transitionStartTime) / 1000);
    document.getElementById('transitionTime').textContent = fmtTime(elapsed);
    const bt = document.getElementById('beginTimer');
    if (bt) bt.textContent = fmtTime(elapsed);
  }, 1000);
}

function stopTransition() {
  if (!isInTransition) return;
  const elapsed = Math.floor((Date.now() - transitionStartTime) / 1000);
  clearInterval(transitionInterval);
  isInTransition = false;
  document.getElementById('transitionBanner').classList.remove('show');

  // Save transition time
  const sess = loadSession(currentDate) || {};
  if (!sess.transitions) sess.transitions = {};
  const prevIdx = activeExercise > 0 ? activeExercise - 1 : 0;
  sess.transitions[`${prevIdx}-${activeExercise}`] = elapsed;
  saveSession(currentDate, sess);
  return elapsed;
}

function saveExercise(exIdx) {
  const ex = exercises[exIdx];
  const saved = loadSets(ex.id, currentDate) || {};
  // Mark all sets as done, fill empty fields with 0
  for (let s = 1; s <= ex.sets; s++) {
    if (!saved[`s${s}`]) saved[`s${s}`] = {};
    saved[`s${s}`].done = true;
    if (ex.type === 'time') {
      if (ex.bilateral) {
        if (!saved[`s${s}`].left) saved[`s${s}`].left = '0';
        if (!saved[`s${s}`].right) saved[`s${s}`].right = '0';
      } else {
        if (!saved[`s${s}`].time) saved[`s${s}`].time = '0';
      }
    } else {
      if (!saved[`s${s}`].weight) saved[`s${s}`].weight = '0';
      if (ex.bilateral) {
        if (!saved[`s${s}`].repsL) saved[`s${s}`].repsL = '0';
        if (!saved[`s${s}`].repsR) saved[`s${s}`].repsR = '0';
      } else {
        if (!saved[`s${s}`].reps) saved[`s${s}`].reps = '0';
      }
    }
  }
  saveSets(ex.id, currentDate, saved);
  scheduleSyncToGist();

  if (exIdx < exercises.length - 1) {
    // Start transition timer, move to next
    startTransition(exIdx);
    activeExercise = exIdx + 1;
    render();
    window.scrollTo(0, 0);
  } else {
    // Last exercise — finish
    finishSession();
  }
}

function beginExercise() {
  stopTransition();
  render();
}

function finishSession() {
  const sess = loadSession(currentDate) || {};
  sess.endTime = Date.now();
  if (sessionStartTime) {
    sess.totalSeconds = Math.floor((sess.endTime - sessionStartTime) / 1000);
  }
  saveSession(currentDate, sess);
  clearInterval(sessionInterval);
  clearInterval(transitionInterval);
  document.getElementById('transitionBanner').classList.remove('show');
  sessionStartTime = null;
  isInTransition = false;
  showSummary();
}

// === SUMMARY ===
function showSummary() {
  const sess = loadSession(currentDate);
  const totalTime = sess?.totalSeconds || 0;

  // Calculate totals
  let totalVolume = 0;
  let totalSets = 0;
  exercises.forEach(ex => {
    const saved = loadSets(ex.id, currentDate);
    if (!saved) return;
    for (let s = 1; s <= ex.sets; s++) {
      const d = saved[`s${s}`];
      if (!d || !d.done) continue;
      totalSets++;
      if (ex.type === 'weight' && d.weight) {
        const reps = ex.bilateral ? Math.max(+(d.repsL||0), +(d.repsR||0)) : +(d.reps||0);
        totalVolume += (+d.weight) * reps;
      }
    }
  });

  // Compare with last session
  const prevDates = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('sess_') && !k.endsWith(currentDate)) prevDates.push(k.replace('sess_',''));
  }
  prevDates.sort().reverse();
  const prevDate = prevDates[0];

  let compHtml = '';
  if (prevDate) {
    let prevVolume = 0;
    exercises.forEach(ex => {
      const saved = loadSets(ex.id, prevDate);
      if (!saved) return;
      for (let s = 1; s <= ex.sets; s++) {
        const d = saved[`s${s}`];
        if (!d) continue;
        if (ex.type === 'weight' && d.weight) {
          const reps = ex.bilateral ? Math.max(+(d.repsL||0), +(d.repsR||0)) : +(d.reps||0);
          prevVolume += (+d.weight) * reps;
        }
      }
    });

    const volDiff = totalVolume - prevVolume;
    const volClass = volDiff > 0 ? 'up' : volDiff < 0 ? 'down' : '';
    const volSign = volDiff > 0 ? '+' : '';

    compHtml = `
      <div class="summary-stat">
        <span class="label">vs ostatni trening</span>
        <span class="value ${volClass}">${volSign}${Math.round(volDiff)} kg wolumenu</span>
      </div>`;

    // Per-exercise comparison
    compHtml += '<div class="summary-ex"><h3>Porownanie cwiczen</h3>';
    exercises.forEach(ex => {
      const curr = loadSets(ex.id, currentDate);
      const prev = loadSets(ex.id, prevDate);
      if (!curr || ex.type === 'time') return;

      let currMax = 0, prevMax = 0;
      for (let s = 1; s <= ex.sets; s++) {
        const cd = curr[`s${s}`];
        if (cd?.weight) currMax = Math.max(currMax, +cd.weight);
        const pd = prev?.[`s${s}`];
        if (pd?.weight) prevMax = Math.max(prevMax, +pd.weight);
      }
      if (currMax === 0 && prevMax === 0) return;
      const diff = currMax - prevMax;
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
      const sign = diff > 0 ? '+' : '';
      compHtml += `<div class="comp">${ex.name}: ${currMax}kg <span class="value ${cls}">(${sign}${diff}kg)</span></div>`;
    });
    compHtml += '</div>';
  }

  // Transition times
  let transHtml = '';
  if (sess?.transitions && Object.keys(sess.transitions).length) {
    transHtml = '<div class="summary-ex"><h3>Przerwy miedzy cwiczeniami</h3>';
    Object.entries(sess.transitions).forEach(([key, sec]) => {
      const [from, to] = key.split('-').map(Number);
      transHtml += `<div class="comp">${exercises[from].name} → ${exercises[to].name}: ${fmtTime(sec)}</div>`;
    });
    transHtml += '</div>';
  }

  document.getElementById('summaryOverlay').innerHTML = `
    <h2>Trening zakonczony!</h2>
    <div class="summary-stat">
      <span class="label">Czas treningu</span>
      <span class="value">${fmtTime(totalTime)}</span>
    </div>
    <div class="summary-stat">
      <span class="label">Serie</span>
      <span class="value">${totalSets}</span>
    </div>
    <div class="summary-stat">
      <span class="label">Wolumen</span>
      <span class="value">${Math.round(totalVolume)} kg</span>
    </div>
    ${compHtml}
    ${transHtml}
    <button class="summary-close" onclick="closeSummary()">Zamknij</button>
  `;
  document.getElementById('summaryOverlay').classList.add('show');
}

function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('show');
  render();
}

// === REST TIMER ===
let restTimerInterval=null, restTimerExIdx=null, restTimerSetNum=null, restTimerSeconds=0;

function startRest(exIdx,setNum){
  stopRest(false);
  restTimerExIdx=exIdx; restTimerSetNum=setNum; restTimerSeconds=0;
  const btn=document.getElementById(`rest-${exIdx}-${setNum}`);
  if(btn){btn.textContent='0:00';btn.classList.add('resting')}
  restTimerInterval=setInterval(()=>{
    restTimerSeconds++;
    const btn=document.getElementById(`rest-${restTimerExIdx}-${restTimerSetNum}`);
    if(btn)btn.textContent=fmtTime(restTimerSeconds);
  },1000);
}
function stopRest(save=true){
  if(restTimerInterval){
    clearInterval(restTimerInterval);
    if(save&&restTimerExIdx!==null&&restTimerSeconds>0){
      const ex=exercises[restTimerExIdx];
      const saved=loadSets(ex.id,currentDate)||{};
      if(!saved[`s${restTimerSetNum}`])saved[`s${restTimerSetNum}`]={};
      saved[`s${restTimerSetNum}`].rest=restTimerSeconds;
      saveSets(ex.id,currentDate,saved);scheduleSyncToGist();
    }
    restTimerInterval=null;
  }
  restTimerExIdx=null;restTimerSetNum=null;restTimerSeconds=0;
}
function toggleRest(exIdx,setNum){
  if(restTimerExIdx===exIdx&&restTimerSetNum===setNum){stopRest(true);render()}
  else startRest(exIdx,setNum);
}

// Helper: input class with warning for '0' values

      }

    // Begin exercise prompt
    let beginHtml = '';
    if (isInTransition && i === activeExercise) {
      beginHtml = `<div style="background:var(--blue);color:#000;border-radius:12px;padding:16px;margin-bottom:16px;text-align:center">
        <div style="font-size:13px;opacity:0.7;margin-bottom:4px">Przerwa trwa...</div>
        <div style="font-size:28px;font-weight:800;font-variant-numeric:tabular-nums" id="beginTimer">0:00</div>
        <button onclick="beginExercise()" style="margin-top:10px;padding:10px 28px;border-radius:10px;border:none;background:#000;color:var(--blue);font-size:15px;font-weight:700;cursor:pointer">Rozpocznij cwiczenie</button>
      </div>`;

      const sd=saved[`s${s}`]||{};

      const restClass=(restTimerExIdx===i&&restTimerSetNum===s)?'rest-btn resting':(sd.rest?'rest-btn has-rest':'rest-btn');
      const restBtn=s<ex.sets?`<button class="${restClass}" id="rest-${i}-${s}" onclick="toggleRest(${i},${s})">${restLabel}</button>`:'';

      if(ex.type==='time'&&ex.bilateral){
        setsHtml+=`<div class="set-row"><span class="set-label">S${s}</span>

          <span class="side-label">R</span><input class="${ic(sd.right)}" type="number" inputmode="numeric" placeholder="sek" value="${sd.right||''}" onchange="onSetChange(${i},${s},'right',this.value)">
          ${restBtn}<button class="done-btn ${sd.done?'checked':''}" onclick="toggleDone(${i},${s})"></button></div>`;
      } else if(ex.type==='time'){
        setsHtml+=`<div class="set-row"><span class="set-label">S${s}</span>
          <input class="${ic(sd.time)}" type="number" inputmode="numeric" placeholder="sek" value="${sd.time||''}" onchange="onSetChange(${i},${s},'time',this.value)">
          <span class="set-unit">sek</span><span class="set-spacer"></span>
          ${restBtn}<button class="done-btn ${sd.done?'checked':''}" onclick="toggleDone(${i},${s})"></button></div>`;
      } else if(ex.bilateral){
        setsHtml+=`<div class="set-row"><span class="set-label">S${s}</span>
          <input class="${ic(sd.weight)}" type="number" inputmode="decimal" placeholder="kg" value="${sd.weight||''}" onchange="onSetChange(${i},${s},'weight',this.value)">
          <span class="set-unit">kg</span>
          <span class="side-label">L</span><input class="${ic(sd.repsL)}" type="number" inputmode="numeric" placeholder="×" value="${sd.repsL||''}" onchange="onSetChange(${i},${s},'repsL',this.value)" style="width:40px">
          <span class="side-label">R</span><input class="${ic(sd.repsR)}" type="number" inputmode="numeric" placeholder="×" value="${sd.repsR||''}" onchange="onSetChange(${i},${s},'repsR',this.value)" style="width:40px">
          ${restBtn}<button class="done-btn ${sd.done?'checked':''}" onclick="toggleDone(${i},${s})"></button></div>`;
      } else {
        setsHtml+=`<div class="set-row"><span class="set-label">S${s}</span>
          <input class="${ic(sd.weight)}" type="number" inputmode="decimal" placeholder="kg" value="${sd.weight||''}" onchange="onSetChange(${i},${s},'weight',this.value)">
          <span class="set-unit">kg ×</span>
          <input class="${ic(sd.reps)}" type="number" inputmode="numeric" placeholder="powt" value="${sd.reps||''}" onchange="onSetChange(${i},${s},'reps',this.value)">
          <span class="set-spacer"></span>${restBtn}
          <button class="done-btn ${sd.done?'checked':''}" onclick="toggleDone(${i},${s})"></button></div>`;
      }
    }

    // Save exercise button
    const saveBtn = (isToday && !allDone) ?
      `<button class="action-btn save-ex" onclick="saveExercise(${i})">Zapisz cwiczenie${i<exercises.length-1?' →':''}</button>` :
      (isToday && allDone && i===exercises.length-1 && sessionStartTime) ?
      `<button class="action-btn finish" onclick="finishSession()">Zakoncz trening</button>` :
      (isToday && allDone) ? `<div style="text-align:center;color:var(--green);font-weight:700;margin-top:12px">✓ Zapisane</div>` : '';

    // Exercise history accordion
    let histAccHtml = '';
    const prevAll = findPrevData(ex.id, currentDate, 5);
    if (prevAll.length) {
      let items = '';
      prevAll.forEach(p => {
        let parts = [];
        for(let s=1;s<=ex.sets;s++){
          const d=p.data[`s${s}`]; if(!d)continue;
          if(ex.type==='time'){if(ex.bilateral)parts.push(`${d.left||'—'}/${d.right||'—'}s`);else if(d.time)parts.push(`${d.time}s`)}
          else{if(ex.bilateral)parts.push(`${d.weight||'—'}kg×${d.repsL||'—'}/${d.repsR||'—'}`);else parts.push(`${d.weight||'—'}kg×${d.reps||'—'}`)}
        }
        if(parts.length) items+=`<div class="ex-history-item"><span class="eh-date">${formatDate(p.date)}</span> ${parts.join(' | ')}</div>`;
      });
      if(items) histAccHtml=`

    exHtml += `
      <div class="exercise ${i===activeExercise?'active':''}" id="ex-${i}">

          ${saveBtn}
          ${histAccHtml}
        </div>
      </div>`;
  });
  document.getElementById('exercisesContainer').innerHTML = exHtml;

  const gi=document.getElementById('gistInfo');
  if(gi){const gid=getGistId();gi.textContent=gid?`Gist: ${gid.substring(0,8)}...`:'Wklej token'}
}

// Interactions
function switchExercise(idx){activeExercise=idx;render();window.scrollTo(0,0)}
function changeDate(delta){currentDate=dateOffset(currentDate,delta);render()}
function onSetChange(exIdx,setNum,field,value){const ex=exercises[exIdx];const saved=loadSets(ex.id,currentDate)||{};if(!saved[`s${setNum}`])saved[`s${setNum}`]={};saved[`s${setNum}`][field]=value;saveSets(ex.id,currentDate,saved);scheduleSyncToGist()}
function toggleDone(exIdx,setNum){const ex=exercises[exIdx];const saved=loadSets(ex.id,currentDate)||{};if(!saved[`s${setNum}`])saved[`s${setNum}`]={};saved[`s${setNum}`].done=!saved[`s${setNum}`].done;saveSets(ex.id,currentDate,saved);scheduleSyncToGist();render()}
function onNotesChange(exIdx,text){saveNotes(exercises[exIdx].id,currentDate,text)}

// Views
function showView(view){
  document.querySelectorAll('.bar-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dateNavContainer').style.display=view==='trening'?'flex':'none';
  document.getElementById('tabsContainer').style.display=view==='trening'?'flex':'none';
  document.getElementById('exercisesContainer').style.display=view==='trening'?'block':'none';
  document.getElementById('historyView').className=view==='historia'?'history-view active':'history-view';
  document.getElementById('settingsView').className=view==='ustawienia'?'settings-view active':'settings-view';
  if(view==='trening')document.getElementById('btnTrening').classList.add('active');

  if(view==='ustawienia')document.getElementById('btnUstawienia').classList.add('active');
}

function renderHistory(){
  const dates=new Set();
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('t_')||k.startsWith('n_')){const p=k.split('_');dates.add(p[p.length-1])}}
  const sorted=[...dates].sort().reverse();
  if(!sorted.length){document.getElementById('historyView').innerHTML='<p style="color:var(--muted);text-align:center;margin-top:40px">Brak historii</p>';return}
  let html='<h2>Historia</h2>';
  sorted.forEach(date=>{
    const sess=loadSession(date);
    let sessInfo=sess?.totalSeconds?`<div class="history-session">Czas sesji: ${fmtTime(sess.totalSeconds)}</div>`:'';
    let entries='';
    exercises.forEach(ex=>{
      const saved=loadSets(ex.id,date);const notes=loadNotes(ex.id,date);
      if(!saved&&!notes)return;
      let setsText=[];
      let hasDone=false;
      for(let s=1;s<=ex.sets;s++){const d=saved?.[`s${s}`];if(!d)continue;
        if(d.done)hasDone=true;
        if(ex.type==='time'){if(ex.bilateral){setsText.push(`S${s}: ${d.left||'—'}/${d.right||'—'}s`)}else{setsText.push(`S${s}: ${d.time||'—'}s`)}}
        else{const restTxt=d.rest?` (${fmtTime(d.rest)})`:'';if(ex.bilateral){setsText.push(`S${s}: ${d.weight||'—'}kg×${d.repsL||'—'}L/${d.repsR||'—'}R${restTxt}`)}else{setsText.push(`S${s}: ${d.weight||'—'}kg×${d.reps||'—'}${restTxt}`)}}}
      if(setsText.length||notes||hasDone){entries+=`<div class="history-entry"><div class="h-name">${ex.name}</div>
        ${setsText.length?`<div class="h-sets">${setsText.join(' | ')}</div>`:''}
        ${notes?`<div class="h-notes">${notes}</div>`:''}</div>`}
    });
    if(entries)html+=`<div class="history-date">${formatDate(date)} <button onclick="deleteTraining('${date}')" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;margin-left:8px">usun</button></div>${sessInfo}${entries}`;
  });
  document.getElementById('historyView').innerHTML=html;
}

function deleteTraining(date) {
  if (!confirm(`Usunac trening z ${formatDate(date)}?`)) return;
  exercises.forEach(ex => {
    localStorage.removeItem(getKey(ex.id, date));
    localStorage.removeItem(`n_${ex.id}_${date}`);
  });
  localStorage.removeItem(`sess_${date}`);
  scheduleSyncToGist();
  renderHistory();
}
